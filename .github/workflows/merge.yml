name: Merge Observatory Databases

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      ignore_freshness_gate:
        description: "Publish even if a fatal source fails the freshness gate. The run still fails."
        type: boolean
        default: false

permissions:
  contents: write   # release create/delete
  issues: write     # the failure notification opens or comments on one issue

concurrency:
  group: observatory-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::RSQLite
            any::jsonlite
            any::testthat
            any::DBI

      - name: Download pipeline databases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p sources

          # Fail the merge if a downloaded asset's on-disk byte size does not
          # EXACTLY match the size GitHub declares for that release asset. A
          # torn / truncated download (or a mid-write asset) would otherwise be
          # merged silently and ship an incomplete DB. This needs no manifest, so
          # it applies uniformly to every source. A legitimately absent source is
          # handled by the warn-and-continue paths and never reaches this check,
          # so only a real size MISMATCH on a file that WAS downloaded is fatal.
          #
          # `gh release view` itself can hiccup (transient network/5xx) on any
          # one of ~20 sequential sources; that is not proof of a torn download,
          # so it is retried and, if still unreadable, warned-and-skipped rather
          # than aborting the whole run -- the downstream PRAGMA integrity_check
          # and row-count gates already backstop real corruption.
          verify_size() {  # $1=repo(owner/name)  $2=tag(empty=latest)  $3=asset  $4=local-path
            local repo="$1" tag="$2" asset="$3" path="$4"
            local view=(release view)
            [ -n "$tag" ] && view+=("$tag")
            view+=(--repo "$repo" --json assets
                   --jq ".assets[] | select(.name == \"$asset\") | .size")

            local declared="" attempt backoffs=(2 4)
            for attempt in 1 2 3; do
              declared=$(gh "${view[@]}" 2>/dev/null | head -1) || true
              [ -n "$declared" ] && break
              if [ "$attempt" -lt 3 ]; then
                echo "  Warning: could not read declared size of $asset from ${repo}@${tag:-latest} (attempt $attempt/3), retrying..."
                sleep "${backoffs[$((attempt - 1))]}"
              fi
            done

            if [ -z "$declared" ]; then
              echo "::warning::Could not read declared size of $asset from ${repo}@${tag:-latest} after 3 attempts; continuing without a size check for this source (downstream integrity/row-count checks still apply)."
              return 0
            fi

            local actual
            actual=$(stat --format=%s "$path")
            if [ "$actual" != "$declared" ]; then
              echo "::error::Torn download: $asset from ${repo}@${tag:-latest} has declared=$declared bytes but actual=$actual bytes on disk at $path. Aborting merge."
              exit 1
            fi
            echo "  size OK: $asset = $actual bytes (matches release asset)"
          }

          latest_tag() {  # $1=repo  $2=series-prefix (metrics|code|data)
            gh release list --repo "r-observatory/$1" --json tagName -q '.[].tagName' \
              | { grep "^$2-" || true; } | sort -r | head -1
          }
          dl_dated() {    # $1=repo  $2=series  $3=target-filename
            # Metrics repos now publish ONE dated metrics-* release carrying both the
            # code and data DBs; prefer it and fall back to the legacy per-series
            # $2-* tag while the metrics- scheme rolls out.
            tag=$(latest_tag "$1" metrics)
            [ -n "$tag" ] || tag=$(latest_tag "$1" "$2")
            if [ -z "$tag" ]; then
              echo "  Warning: no metrics-*/$2-* release in r-observatory/$1"; return 0
            fi
            tmpdir=$(mktemp -d)
            if gh release download "$tag" --repo "r-observatory/$1" --pattern "$3" --dir "$tmpdir" 2>/dev/null; then
              mv "$tmpdir/$3" "sources/$3"
              echo "  -> sources/$3 from $tag ($(stat --format=%s "sources/$3") bytes)"
              verify_size "r-observatory/$1" "$tag" "$3" "sources/$3"
            else
              echo "  Warning: could not download $3 from $1@$tag"
            fi
            rm -rf "$tmpdir"
          }

          echo "--- Metrics repos (dated series) ---"
          dl_dated cran-code-metrics code cran-code-metrics.db
          dl_dated cran-code-metrics data cran-data-metrics.db
          dl_dated bioc-code-metrics code bioc-code-metrics.db
          dl_dated bioc-code-metrics data bioc-data-metrics.db

          declare -A repo_db_map
          repo_db_map[cran-queue]=queue.db
          repo_db_map[cran-feed]=feed.db
          repo_db_map[cran-downloads]=downloads-summary.db
          repo_db_map[cran-metadata]=metadata.db
          repo_db_map[r2u-downloads]=r2u-summary.db
          repo_db_map[autoobs-downloads]=autoobs-downloads-summary.db
          repo_db_map[copr-downloads]=copr-downloads-summary.db
          repo_db_map[conda-forge-downloads]=conda-forge-downloads-summary.db
          repo_db_map[bioconda-downloads]=bioconda-downloads-summary.db
          repo_db_map[c2d4u-downloads]=c2d4u-downloads-summary.db
          repo_db_map[bioconductor-downloads]=bioconductor-summary.db
          repo_db_map[bioconductor-metadata]=bioconductor-metadata.db
          repo_db_map[cran-archive]=cran-archive.db
          repo_db_map[cran-coverage]=cran-coverage.db
          repo_db_map[vcs-signals]=vcs-signals-summary.db
          repo_db_map[cran-task-views]=cran-task-views.db

          for repo in cran-queue cran-feed cran-downloads cran-metadata r2u-downloads autoobs-downloads copr-downloads conda-forge-downloads bioconda-downloads c2d4u-downloads bioconductor-downloads bioconductor-metadata cran-archive cran-coverage vcs-signals cran-task-views; do
            target="${repo_db_map[$repo]}"
            echo "--- Downloading from r-observatory/$repo ---"

            # Create a temp directory for this download
            tmpdir=$(mktemp -d)

            # cran-downloads and r2u-downloads use a rolling "current" tag with
            # sharded assets; we only want their small summary DB ($target).
            case "$repo" in
              cran-downloads|r2u-downloads|autoobs-downloads|copr-downloads|conda-forge-downloads|bioconda-downloads|c2d4u-downloads|bioconductor-downloads|bioconductor-metadata|cran-archive|cran-coverage|vcs-signals|cran-task-views)
                dl_tag=current
                download_cmd=(gh release download current
                              --repo "r-observatory/$repo"
                              --pattern "$target"
                              --dir "$tmpdir")
                ;;
              *)
                # No fixed tag: these publish plain dated releases with
                # "latest" moving over time. Resolve the tag ONCE up front and
                # download+verify that exact tag, so a re-publish between the
                # download and the size check can't make verify_size compare
                # against a different release than the one we just downloaded
                # (a false-mismatch TOCTOU, real for frequent publishers).
                dl_tag=$(gh release view --repo "r-observatory/$repo" --json tagName -q .tagName 2>/dev/null) || true
                if [ -n "$dl_tag" ]; then
                  download_cmd=(gh release download "$dl_tag"
                                --repo "r-observatory/$repo"
                                --pattern "*.db"
                                --dir "$tmpdir")
                else
                  download_cmd=(gh release download
                                --repo "r-observatory/$repo"
                                --pattern "*.db"
                                --dir "$tmpdir")
                fi
                ;;
            esac

            # Retry on the same 3-attempt backoff verify_size uses. A source
            # that is absent because one HTTPS call hiccuped is indistinguishable
            # downstream from a source whose release genuinely has no asset, and
            # for feed.db and metadata.db the second of those refuses the whole
            # release. Clear any partial write first, since gh release download
            # refuses to overwrite a file it already fetched.
            dl_ok=""
            dl_backoffs=(2 4)
            for attempt in 1 2 3; do
              if "${download_cmd[@]}" 2>/dev/null; then dl_ok=yes; break; fi
              if [ "$attempt" -lt 3 ]; then
                echo "  Warning: download from r-observatory/$repo failed (attempt $attempt/3), retrying..."
                find "$tmpdir" -mindepth 1 -delete 2>/dev/null || true
                sleep "${dl_backoffs[$((attempt - 1))]}"
              fi
            done

            if [ -n "$dl_ok" ]; then
              # Find the downloaded .db file and rename to expected name
              downloaded=$(find "$tmpdir" -name "*.db" -type f | head -1)
              if [ -n "$downloaded" ]; then
                mv "$downloaded" "sources/$target"
                echo "  -> sources/$target ($(stat --format=%s "sources/$target") bytes)"
                # Verify against the ACTUAL downloaded asset name (not $target,
                # which is a local rename), so the check holds even where the
                # published asset name differs from the merged filename.
                verify_size "r-observatory/$repo" "$dl_tag" "$(basename "$downloaded")" "sources/$target"
              else
                echo "  Warning: No .db file found in release for $repo"
              fi
            else
              echo "  Warning: Could not download release from r-observatory/$repo after 3 attempts"
            fi

            rm -rf "$tmpdir"
          done

          echo ""
          echo "Downloaded databases:"
          ls -lh sources/ || echo "  (none)"

          # Validate downloaded databases
          echo ""
          echo "Validating databases..."
          for db in sources/*.db; do
            if [ -f "$db" ]; then
              if sqlite3 "$db" "PRAGMA integrity_check" 2>/dev/null | grep -q "^ok$"; then
                echo "  $(basename $db): OK"
              else
                echo "  $(basename $db): FAILED integrity check, removing"
                # Record the removal so the freshness gate can tell a corrupt
                # source from one that simply never published. Without this the
                # two are identical by the time merge.R runs.
                basename "$db" >> sources/.integrity-failed
                rm -f "$db"
              fi
            fi
          done

      - name: Run unit tests
        run: Rscript scripts/tests/testthat.R

      - name: Run merge
        run: |
          Rscript scripts/merge.R sources observatory.db

      - name: Collect pipeline freshness metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Rscript scripts/collect-metadata.R observatory.db

      - name: Check source freshness
        env:
          GATE_OVERRIDE: ${{ inputs.ignore_freshness_gate }}
        run: |
          # Runs before anything is compressed, deleted or published, so a
          # fatal verdict costs nothing. Only a source whose loss breaks the
          # site stops the release here; everything else is recorded in
          # merge-gate-failed and reddens the run after publishing.
          Rscript scripts/check-freshness.R observatory.db sources

      - name: Compress database for release
        run: |
          # The uncompressed observatory.db has grown close to GitHub's 2 GiB
          # release-asset cap, so we publish a zstd-compressed asset instead.
          # The viewer deploy decompresses it before use; the database itself
          # is unchanged.
          command -v zstd >/dev/null || { echo "::error::zstd not found on the runner"; exit 1; }
          zstd -12 -T0 -f observatory.db -o observatory.db.zst
          echo "observatory.db $(stat -c%s observatory.db) bytes -> observatory.db.zst $(stat -c%s observatory.db.zst) bytes"

      - name: Guard release-asset size
        run: |
          # GitHub release assets are hard-capped at 2 GiB. Abort before we
          # touch any tag if the published asset is oversized, so a runaway
          # merge fails loud here instead of deleting today's release and then
          # failing on the upload. We publish the compressed asset, so guard
          # that.
          ASSET_BYTES=$(stat -c%s observatory.db.zst)
          MAX_BYTES=2040109465
          echo "observatory.db.zst is $ASSET_BYTES bytes (limit $MAX_BYTES)."
          if [ "$ASSET_BYTES" -gt "$MAX_BYTES" ]; then
            echo "::error::observatory.db.zst ($ASSET_BYTES bytes) exceeds the ${MAX_BYTES}-byte release-asset guard. Not publishing."
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date -u +%Y-%m-%d)"

          # Delete existing release/tag for today if re-running
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            observatory.db.zst \
            --title "Observatory DB - $(date -u +%Y-%m-%d)" \
            --notes-file release_notes.md \
            --latest

          # Marker for the failure notification, so it can say whether the site
          # got data today rather than only that something went wrong.
          echo "$TAG" > release-published

      - name: Trigger viewer deploy
        env:
          GH_TOKEN: ${{ secrets.VIEWER_DEPLOY_TOKEN }}
        run: |
          # This step used to swallow its own failure, and so reported success
          # for thirteen consecutive runs while dispatching nothing: the secret
          # does not exist and an empty GH_TOKEN makes gh fail quietly. The
          # release above is already published, so failing here costs no data.
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::VIEWER_DEPLOY_TOKEN is not set on r-observatory/data, so repos/r-observatory/viewer/dispatches was never called and the viewer was not redeployed. Today's release WAS published. Add a repository secret named VIEWER_DEPLOY_TOKEN holding a token with write access to r-observatory/viewer."
            exit 1
          fi
          gh api repos/r-observatory/viewer/dispatches \
            -f event_type=data-updated

      - name: Fail the run if any source failed the gate
        if: '!cancelled()'
        run: |
          # The non-fatal half of the gate. By the time this runs the release
          # either shipped or was refused earlier; either way this step only
          # reddens the run so the notification below fires. It never blocks a
          # release.
          if [ -f merge-gate-failed ]; then
            echo "::error::At least one source failed the freshness gate:"
            cat merge-gate-failed
            exit 1
          fi
          echo "No source failed the freshness gate."

      - name: Report failure as an issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # One issue, not one per day: the title carries no date, so a week of
          # failures becomes a week of comments on a single thread.
          TITLE="[Merge failure] Merge Observatory Databases"

          # gh issue create rejects an unknown label, so make sure it exists.
          # --force is a no-op update when it already does.
          gh label create workflow-failure \
            --repo "$GITHUB_REPOSITORY" \
            --color d73a4a \
            --description "The daily merge workflow failed" \
            --force || true

          {
            # Lead with whether the site got data today. Every other line is
            # detail; this one is the difference between an outage and a
            # degraded but published run, and a reader must not have to open
            # the Actions tab to tell them apart.
            if [ -f merge-gate-refused ]; then
              echo "NO RELEASE WAS PUBLISHED today: a source the site cannot function without failed the gate."
            elif [ ! -f release-published ]; then
              echo "NO RELEASE WAS PUBLISHED today: the run failed before the release was created (see the run for which step)."
            elif [ -f merge-gate-failed ]; then
              echo "Today's release WAS published, but at least one source is degraded."
            else
              echo "Today's release WAS published; the merge job failed after publishing (see the run for which step)."
            fi
            echo
            echo "Run: $RUN_URL"
            echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            if [ -f merge-gate-failed ]; then
              echo "Sources that failed the freshness gate:"
              echo
              sed 's/^/- /' merge-gate-failed
              echo
            fi
            echo "The run summary carries the full per-source verdict table."
          } > issue-body.md

          # A lookup that fails (rate limit, transient 5xx) must not abort the
          # step under `bash -e` and drop the notification entirely. A duplicate
          # thread once in a blue moon is far cheaper than silence on the day
          # the merge broke.
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
                  --label workflow-failure --json number,title \
                  --jq "[.[] | select(.title == \"$TITLE\")] | .[0].number // empty") || NUM=""

          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "$GITHUB_REPOSITORY" --body-file issue-body.md
            echo "Commented on existing issue #$NUM"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --body-file issue-body.md \
              --label workflow-failure
          fi
